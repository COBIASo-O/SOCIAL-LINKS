<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height:100vh;
    background:#04010f;
    font-family:'Rajdhani',sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    overflow-x:hidden;
    position:relative;
  }

  /* Nebula background */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 70% 60% at 10% 30%, rgba(100,20,210,0.75) 0%, transparent 65%),
      radial-gradient(ellipse 60% 55% at 90% 20%, rgba(70,0,160,0.7) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 85%, rgba(85,10,180,0.65) 0%, transparent 60%),
      radial-gradient(ellipse 50% 45% at 70% 55%, rgba(55,0,120,0.55) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 25% 75%, rgba(110,25,220,0.5) 0%, transparent 50%);
    pointer-events:none;
  }

  /* Scanlines */
  body::after {
    content:'';
    position:fixed; inset:0; z-index:10; pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
    pointer-events:none;
  }

  canvas#stars {
    position:fixed; inset:0; z-index:2; pointer-events:none; background:transparent;
  }

  .container {
    position:relative; z-index:20;
    width:100%; max-width:480px;
    display:flex; flex-direction:column; align-items:center;
    gap:14px;
  }


  /* Schedule bar */
  .schedule-bar {
    width:100%;
    padding:10px 18px;
    background:linear-gradient(135deg, rgba(6,2,18,0.92), rgba(12,4,30,0.88));
    border:1px solid rgba(147,51,234,0.35);
    border-radius:4px;
    text-align:center;
    position:relative;
    overflow:hidden;
    margin-bottom:4px;
    animation:tagPulse 4s ease-in-out infinite;
  }
  .schedule-bar::before {
    content:'';
    position:absolute; top:0; left:10%; right:10%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(147,51,234,0.7),transparent);
  }
  .schedule-label {
    font-family:'Rajdhani',sans-serif;
    font-size:10px; font-weight:700;
    letter-spacing:4px; text-transform:uppercase;
    color:rgba(147,51,234,0.7);
    margin-bottom:3px;
  }
  .schedule-text {
    font-family:'Rajdhani',sans-serif;
    font-size:15px; font-weight:700;
    letter-spacing:2px;
    color:transparent;
    background:linear-gradient(90deg, #ffffff, #9333ea);
    -webkit-background-clip:text; background-clip:text;
  }
  @keyframes tagPulse {
    0%,100% { box-shadow:0 0 10px rgba(147,51,234,0.15); border-color:rgba(147,51,234,0.35); }
    50%     { box-shadow:0 0 20px rgba(147,51,234,0.35); border-color:rgba(147,51,234,0.7); }
  }

  /* Profile pic placeholder */
  
  .avatar-wrap {
    display:flex; align-items:center; justify-content:center;
    margin-bottom:4px;
  }
  #alienIcon {
    animation:alienTwist 4s ease-in-out infinite, alienGlow 4s ease-in-out infinite;
    transform-origin: center;
  }
  @keyframes alienTwist {
    0%   { transform: rotate(-12deg); }
    50%  { transform: rotate(12deg); }
    100% { transform: rotate(-12deg); }
  }
  @keyframes alienGlow {
    0%,100% { filter:drop-shadow(0 0 8px rgba(147,51,234,0.9)) drop-shadow(0 0 20px rgba(88,28,135,0.6)); }
    50%     { filter:drop-shadow(0 0 16px rgba(147,51,234,1)) drop-shadow(0 0 35px rgba(107,33,168,0.8)); }
  }
  @keyframes avatarPulse {
    0%,100%{box-shadow:0 0 20px rgba(168,85,247,0.5),0 0 50px rgba(168,85,247,0.2)}
    50%    {box-shadow:0 0 30px rgba(168,85,247,0.8),0 0 70px rgba(96,165,250,0.3)}
  }

  .name {
    font-family:'SpaceAge',cursive;
    font-size:38px; font-weight:900;
    letter-spacing:10px;
    color:transparent;
    background:linear-gradient(155deg,#ffffff 0%,#9333ea 25%,#6b21a8 55%,#3b0070 80%,#1a0035 100%);
    -webkit-background-clip:text; background-clip:text;
    filter:drop-shadow(0 0 8px rgba(168,85,247,0.9)) drop-shadow(0 0 20px rgba(100,20,180,0.6));
    animation:nameGlow 4s ease-in-out infinite;
  }
  @keyframes nameGlow {
    0%,100%{filter:drop-shadow(0 0 8px rgba(168,85,247,0.9)) drop-shadow(0 0 20px rgba(100,20,180,0.6))}
    50%    {filter:drop-shadow(0 0 14px rgba(180,100,255,1)) drop-shadow(0 0 35px rgba(160,80,255,0.9))}
  }

  .tagline {
    font-size:13px; font-weight:600; letter-spacing:6px;
    color:rgba(180,120,255,0.6);
    text-transform:uppercase;
    margin-bottom:6px;
  }

  /* Divider */
  .divider {
    display:flex; align-items:center; gap:12px;
    width:100%; margin:4px 0 10px;
  }
  .div-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(168,85,247,0.6)); }
  .div-line.r { background:linear-gradient(90deg,rgba(168,85,247,0.6),transparent); }
  .div-diamond {
    width:8px; height:8px;
    background:rgba(192,132,252,0.8);
    clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
    animation:spinD 6s linear infinite;
  }
  @keyframes spinD { to{transform:rotate(360deg)} }

  /* Link buttons */
  .link-btn {
    display:flex; align-items:center; gap:16px;
    width:100%; padding:16px 22px;
    background:linear-gradient(135deg,rgba(14,4,36,0.9),rgba(20,6,50,0.85));
    border:1px solid rgba(168,85,247,0.35);
    border-radius:6px;
    text-decoration:none;
    color:#e9d5ff;
    font-family:'Rajdhani',sans-serif;
    font-size:17px; font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    position:relative; overflow:hidden;
    transition:border-color 0.3s, transform 0.2s, box-shadow 0.3s;
    cursor:pointer;
  }
  .link-btn::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(168,85,247,0.6),transparent);
  }
  .link-btn:hover {
    border-color:rgba(168,85,247,0.8);
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(168,85,247,0.25), 0 0 0 1px rgba(168,85,247,0.2);
  }
  .link-btn:active { transform:translateY(0); }

  .btn-icon {
    width:36px; height:36px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border-radius:8px; font-size:20px;
  }
  .btn-label { flex:1; font-family:'SpaceAge',cursive; }
  .btn-arrow {
    font-size:16px; opacity:0.5;
    transition:opacity 0.2s, transform 0.2s;
  }
  .link-btn:hover .btn-arrow { opacity:1; transform:translateX(4px); }

  /* Platform colors */
  .twitch  { --pc:rgba(145,70,255,0.5); }
  .tiktok  { --pc:rgba(120,40,200,0.3); }
  .youtube { --pc:rgba(255,50,50,0.35); }
  .facebook{ --pc:rgba(24,119,242,0.35); }
  .kick    { --pc:rgba(83,252,24,0.15); }
  .donate  { --pc:rgba(168,85,247,0.35); }

  .facebook .btn-icon { background:rgba(24,119,242,0.12); }
  .kick     .btn-icon { background:rgba(83,252,24,0.08); }
  .donate  .btn-icon { background:rgba(240,171,252,0.12); }

  .twitch:hover   { box-shadow:0 8px 30px rgba(145,70,255,0.3); border-color:rgba(145,70,255,0.7); }
  .tiktok:hover   { box-shadow:0 8px 30px rgba(168,85,247,0.2); border-color:rgba(168,85,247,0.5); }
  .youtube:hover  { box-shadow:0 8px 30px rgba(255,50,50,0.25); border-color:rgba(255,80,80,0.6); }
  .facebook:hover { box-shadow:0 8px 30px rgba(24,119,242,0.25); border-color:rgba(24,119,242,0.6); }
  .kick:hover     { box-shadow:0 8px 30px rgba(83,252,24,0.15); border-color:rgba(83,252,24,0.4); }
  .donate:hover   { box-shadow:0 8px 30px rgba(168,85,247,0.3); border-color:rgba(200,150,255,0.7); }

  /* Donate button special styling */

    color:rgba(168,85,247,0.35);
    text-transform:uppercase;
  }
</style>
</head>

<script>
  // Stars
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  // Dense starfield — 3 layers: tiny dim, medium, bright
  const STARS = [];
  for(let i=0;i<600;i++) STARS.push({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.2+0.4,
    a:Math.random()*0.5+0.25,
    speed:Math.random()*0.004+0.001,
    phase:Math.random()*Math.PI*2,
    type:'dim'
  });
  for(let i=0;i<180;i++) STARS.push({
    x:Math.random(), y:Math.random(),
    r:Math.random()*1.6+0.8,
    a:Math.random()*0.5+0.45,
    speed:Math.random()*0.006+0.002,
    phase:Math.random()*Math.PI*2,
    type:'mid'
  });
  for(let i=0;i<40;i++) STARS.push({
    x:Math.random(), y:Math.random(),
    r:Math.random()*2+1.2,
    a:Math.random()*0.3+0.7,
    speed:Math.random()*0.008+0.003,
    phase:Math.random()*Math.PI*2,
    type:'bright'
  });

  // Nebula cloud patches drawn on canvas for extra depth
  function drawNebulaClouds() {
    const clouds = [
      {x:0.15,y:0.25,rx:180,ry:130,col:'rgba(100,20,220,0.35)'},
      {x:0.85,y:0.15,rx:150,ry:120,col:'rgba(70,0,160,0.3)'},
      {x:0.5, y:0.7, rx:200,ry:140,col:'rgba(90,10,200,0.3)'},
      {x:0.3, y:0.6, rx:120,ry:100,col:'rgba(110,25,230,0.25)'},
    ];
    clouds.forEach(cl=>{
      const grd = ctx.createRadialGradient(
        cl.x*canvas.width, cl.y*canvas.height, 0,
        cl.x*canvas.width, cl.y*canvas.height, cl.rx
      );
      grd.addColorStop(0, cl.col);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.ellipse(cl.x*canvas.width, cl.y*canvas.height, cl.rx, cl.ry, 0, 0, Math.PI*2);
      ctx.fill();
    });
  }

  function drawStars(t) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawNebulaClouds();
    STARS.forEach(s=>{
      const a = s.a*(0.4+0.6*Math.sin(t*s.speed+s.phase));
      ctx.beginPath();
      ctx.arc(s.x*canvas.width, s.y*canvas.height, s.r, 0, Math.PI*2);
      // Bright stars get a subtle purple tint
      const col = `rgba(255,255,255,${a})`;
      ctx.fillStyle = col;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // Fetch schedule from schedule.json in same repo
  fetch('schedule.json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      document.getElementById('scheduleText').textContent = d.schedule;
    })
    .catch(function(){
      document.getElementById('scheduleText').textContent = 'Streaming every Monday–Thursday from 8PM–10PM CST';
    });
</script>
